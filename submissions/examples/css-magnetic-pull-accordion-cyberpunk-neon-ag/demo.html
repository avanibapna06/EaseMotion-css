<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Magnetic Pull Accordion (Cyberpunk Neon)</title>
  
  <!-- Embedded Stylesheet -->
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="cyber-body">

  <div class="cyber-container">
    <div class="cyber-bg-glow" aria-hidden="true"></div>
    
    <!-- Cyber Terminal Header -->
    <header class="cyber-header" role="banner">
      <span class="cyber-tag">DECK SECURE // SYS_RUN</span>
      <h1>Cybernetic Accordion Console</h1>
      <p>
        A pure CSS interactive component utilizing a spring-like **Magnetic Pull** transition, styled to complement retro-futuristic cyberpunk terminals.
      </p>
    </header>

    <!-- Accordion Component -->
    <main class="ease-cyber-accordion" role="main" aria-label="System configuration console">

      <!-- Item 1: Neural Interface Core (Green Status) -->
      <details class="ease-cyber-item" open>
        <summary class="ease-cyber-header" aria-expanded="true">
          
          <!-- Code Index -->
          <span class="ease-header-code">[ 01 ]</span>
          
          <!-- Module Title & Info -->
          <div class="ease-header-text">
            <h3 class="ease-header-title">Neural Interface Link</h3>
            <p class="ease-header-desc">Sync Rate & Biosensors</p>
          </div>
          
          <!-- Status Indicator -->
          <div class="ease-status-wrapper ease-status-online" aria-label="Status: Online">
            <div class="ease-status-dot"></div>
            <span class="ease-status-label">ONLINE</span>
          </div>
          
          <!-- Futuristic Caret -->
          <span class="ease-cyber-caret" aria-hidden="true">&gt;</span>
          
        </summary>
        
        <!-- Expandable Content Panel -->
        <div class="ease-cyber-content">
          
          <!-- Segmented Cyber Load Bar -->
          <div class="terminal-title">Sync Load Capacity</div>
