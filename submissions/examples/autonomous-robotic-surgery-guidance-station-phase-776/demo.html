<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotic Surgery Guidance Station</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="surgery-interface">
        <header>
            <h1>Robotic Surgery Station</h1>
            <div class="status-indicator">SYSTEM ONLINE</div>
        </header>
        <div class="main-dashboard">
            <div class="camera-feed">
                <div class="scanner-line"></div>
                <p>Precise Guidance Mode Active</p>
            </div>
            <div class="controls">
                <button class="action-btn">Initialize Procedure</button>
            </div>
        </div>
    </div>
</body>
</html>
