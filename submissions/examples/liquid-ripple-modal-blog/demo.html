<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Liquid Ripple Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="modal-wrapper">
  <label for="modal-trigger" class="btn">Open Liquid Modal</label>
  
  <input type="checkbox" id="modal-trigger" class="hidden">
  
  <div class="modal-overlay">
    <div class="modal-content">
      <h2>Liquid Ripple Effect</h2>
      <p>This modal expands with a fluid circular transition.</p>
      <label for="modal-trigger" class="close-btn">Close Modal</label>
    </div>
  </div>
</div>

</body>
</html>
