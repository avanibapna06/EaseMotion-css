<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Geothermal Rig Console</title>
</head>
<body>
    <div class="console-wrapper">
        <header>
            <h1>SUB-SURFACE RIG #730</h1>
            <div class="status-indicator">OPERATIONAL</div>
        </header>
        
        <main class="dashboard">
            <div class="gauge">
                <h3>CORE TEMPERATURE</h3>
                <div class="bar-fill"></div>
            </div>
            <div class="gauge">
                <h3>DRILL DEPTH</h3>
                <div class="bar-fill slow-pulse"></div>
            </div>
        </main>
    </div>
</body>
</html>
